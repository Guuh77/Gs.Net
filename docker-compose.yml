services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: agroguard-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: "OracleRoot123"
      APP_USER: "AGROGUARD"
      APP_USER_PASSWORD: "AgroGuard123"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  oracle-data:
